appVersion: v1
kind: configMap
metadata:
  name: payment
  namespace: roboshop
data:
  CART_HOST: cart
  CART_PORT: "8080"
  USER_HOST: user
  USER_PORT: "8080"
  AMQP_HOST: rabbitmq
  AMQP_USER: roboshop
  AMQP_PASS: roboshop123
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: payment
  replicas: 1
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: payment   
    spec:
      containers:
        - name: payment
          image: saithota9/payment:1.0.0
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "75m"
              memory: "100Mi"
            limits:
              cpu: "200m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            # httpGet:
            #   path: /health
            #   port: 8080
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: payment
---
apiVersion: v1
kind: Service
metadata:
  name: payment
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: payment 
spec:
  selector:
    project: roboshop
    tier: backend
    component: payment 
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080