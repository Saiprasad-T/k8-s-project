apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mongodb
  replicas: 1
  template:
    metadata:
      labels:
        project: roboshop
        tier: db
        component: mongodb   
    spec:
      containers:
        - name: mongodb
          image: saithota9/mongodb:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mongodb 
spec:
  selector:
    project: roboshop
    tier: db
    component: mongodb 
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 27017
      targetPort: 27017