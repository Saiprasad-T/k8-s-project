apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue
  replicas: 1
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue   
    spec:
      containers:
        - name: catalogue
          image: saithota9/catalogue:1.0.0
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "25m"
              memory: "65Mi"
            limits:
              cpu: "100m"
              memory: "120Mi"
          readinessProbe:
            # httpGet:
            #   path: /health
            #   port: 8080
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            # httpGet:
            #   path: /health
            #   port: 8080
            tcpSocket:
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 10
          envFrom:
            - configMapRef:
                name: catalogue
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue 
spec:
  selector:
    project: roboshop
    tier: backend
    component: catalogue 
  type: ClusterIP
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080